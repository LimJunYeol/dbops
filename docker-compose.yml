version: "3.8"

services:
  meta-db:
    image: mysql:8.0
    container_name: dbops-meta
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: metapass123
      MYSQL_DATABASE: dbops_meta

  target-db-1:
    image: mysql:8.0
    container_name: dbops-target-1
    ports: ["3307:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: target1pass
      MYSQL_DATABASE: sample_order
    volumes:
      - target1-conf:/etc/mysql/conf.d

  target-db-2:
    image: mysql:8.0
    container_name: dbops-target-2
    ports: ["3308:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: target2pass
      MYSQL_DATABASE: sample_user

  target-db-3:
    image: mysql:8.0
    container_name: dbops-target-3
    ports: ["3309:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: target3pass
      MYSQL_DATABASE: sample_log

  salt-master:
    build: ./salt
    container_name: dbops-salt-master
    command: ["sh", "-c", "printf 'auto_accept: True\\ninterface: 0.0.0.0\\n' > /etc/salt/master && salt-master -l info"]
    volumes:
      - ./salt/states:/srv/salt

  salt-minion:
    build: ./salt
    container_name: dbops-salt-minion
    command: ["sh", "-c", "printf 'master: salt-master\\nid: target-db-1-host\\n' > /etc/salt/minion && salt-minion -l info"]
    volumes:
      - target1-conf:/etc/mysql-conf
    depends_on:
      - salt-master

volumes:
  target1-conf:
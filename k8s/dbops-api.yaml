apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbops-api
spec:
  replicas: 2            # 2대로 실행 -> 1대 죽어도 서비스 유지
  selector:
    matchLabels: { app: dbops-api }
  template:
    metadata:
      labels: { app: dbops-api }
    spec:
      containers:
        - name: api
          image: dbops-api:0.1
          imagePullPolicy: Never    # minikube 로컬 이미지 사용
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dbops-api-svc
spec:
  type: NodePort
  selector: { app: dbops-api }
  ports:
    - port: 8080
      nodePort: 30080